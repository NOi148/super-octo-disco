<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>온길 앱</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 앱 전용 레이아웃 설정 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        
        /* 전체 컨테이너를 휴대폰 화면으로 고정 */
        .app-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            background: #F5F5DC;
        }

        /* 1. 상단바 (App Bar) */
        .app-header {
            height: 60px; background: #0A6E0A; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem; flex-shrink: 0;
        }

        /* 2. 본문 영역 (스크롤 가능) */
        .app-content {
            flex: 1; overflow-y: auto;
            padding: 20px; -webkit-overflow-scrolling: touch;
        }

        /* 3. 하단바 (Bottom Nav) */
        .app-bottom-nav {
            height: 70px; background: white; border-top: 1px solid #ddd;
            display: flex; justify-content: space-around; align-items: center;
            flex-shrink: 0;
        }

        .nav-item { text-align: center; font-size: 0.8rem; color: #666; cursor: pointer; }
        .nav-item.active { color: #0A6E0A; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">온길</header>

        <main class="app-content">
            <div id="view">
                <h2>로그인</h2>
                <input type="text" placeholder="아이디" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd;">
                <button style="width:100%; padding:15px; background:#0A6E0A; color:white; border:none; border-radius:10px; margin-top:10px;">로그인</button>
            </div>
        </main>

        <nav class="app-bottom-nav">
            <div class="nav-item active">🏠<br>홈</div>
            <div class="nav-item">📍<br>지도</div>
            <div class="nav-item">🏥<br>병원</div>
            <div class="nav-item">👤<br>정보</div>
        </nav>
    </div>

</body>
</html>
