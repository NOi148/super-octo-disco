<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온길 - 시작하기</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="header"><h1 class="app-name">온길</h1></div>
        <div class="page active" id="pageLogin">
            <h2>로그인</h2>
            <div class="input-group"><input type="text" id="loginId" placeholder="아이디"></div>
            <div class="input-group"><input type="password" id="loginPw" placeholder="비밀번호"></div>
            <button class="btn-main" onclick="handleLogin()">로그인</button>
            <button class="btn-text" onclick="goPage('pageJoin')">회원가입 하러가기</button>
        </div>
        <div class="page" id="pageJoin">
            <h2>회원가입</h2>
            <div class="input-group"><input type="text" id="joinId" placeholder="아이디 (@ 제외)"></div>
            <div class="input-group"><input type="password" id="joinPw" placeholder="비밀번호"></div>
            <button class="btn-main" onclick="handleJoin()">다음 단계로</button>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
