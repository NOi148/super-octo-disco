<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>온길 - 온전히 걷는 길</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <h1 class="logo">온길</h1>
        </header>

        <main class="app-main">
            <div id="auth-page" class="page-container">
                <div class="welcome-section">
                    <h2>반가워요!</h2>
                    <p>어르신의 안전한 걸음, 온길이 함께합니다.</p>
                </div>

                <div class="input-card">
                    <input type="text" id="loginId" placeholder="아이디">
                    <input type="password" id="loginPw" placeholder="비밀번호">
                    <button class="btn-primary" onclick="handleLogin()">로그인</button>
                    <button class="btn-secondary" onclick="location.href='signup.html'">회원가입 하러가기</button>
                </div>
            </div>
        </main>

        <nav class="app-nav">
            <button class="nav-item active">🏠<span>홈</span></button>
            <button class="nav-item">📍<span>지도</span></button>
            <button class="nav-item">🏥<span>병원</span></button>
            <button class="nav-item">👤<span>내정보</span></button>
        </nav>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
