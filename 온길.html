<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온길 (On-gil) - 회원가입</title>
    <style>
        :root {
            --on-gil-green: #2E7D32;
            --on-gil-light: #E8F5E9;
            --text-main: #333;
            --text-sub: #666;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .phone-frame {
            background: white;
            width: 360px;
            height: 640px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #333;
        }

        .header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .app-name {
            color: var(--on-gil-green);
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .progress-container {
            padding: 0 30px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
        }

        .progress-fill {
            height: 100%;
            background: var(--on-gil-green);
            width: 16.6%;
            transition: all 0.4s ease;
            border-radius: 3px;
        }

        .content {
            flex: 1;
            padding: 0 30px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 20px;
            color: var(--text-main);
            line-height: 1.4;
            margin-bottom: 25px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--on-gil-green);
        }

        .check-group {
            display: grid;
            gap: 12px;
        }

        .check-card {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .check-card input {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            accent-color: var(--on-gil-green);
        }

        .check-card:has(input:checked) {
            border-color: var(--on-gil-green);
            background-color: var(--on-gil-light);
        }

        .footer {
            padding: 20px 30px 40px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-next { background: var(--on-gil-green); color: white; }
        .btn-prev { background: #eee; color: #666; }
        button:active { opacity: 0.8; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="header">
        <h1 class="app-name">온길 (On-gil)</h1>
    </div>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <form id="onGilForm" class="content">
        <!-- Step 1: 이름 -->
        <div class="step active" id="step1">
            <h2>반가워요!<br>성함이 어떻게 되시나요?</h2>
            <input type="text" id="name" placeholder="성함 입력" required>
        </div>

        <!-- Step 2: 성별 -->
        <div class="step" id="step2">
            <h2>성별을 선택해주세요.</h2>
            <select id="gender">
                <option value="male">남성</option>
                <option value="female">여성</option>
                <option value="none">선택 안 함</option>
            </select>
        </div>

        <!-- Step 3: 연령 -->
        <div class="step" id="step3">
            <h2>실례지만 연령대가<br>어떻게 되시나요?</h2>
            <input type="number" id="age" placeholder="나이(숫자) 입력">
        </div>

        <!-- Step 4: 질병 (체크리스트) -->
        <div class="step" id="step4">
            <h2>현재 조금이라도<br>불편한 부위가 있나요?</h2>
            <div class="check-group">
                <label class="check-card"><input type="checkbox" name="disease" value="knee">무릎 / 발목</label>
                <label class="check-card"><input type="checkbox" name="disease" value="back">허리 / 등</label>
                <label class="check-card"><input type="checkbox" name="disease" value="heart">심장 / 폐 (숨참)</label>
                <label class="check-card"><input type="checkbox" name="disease" value="balance">어지럼증 / 균형 잃음</label>
            </div>
        </div>

        <!-- Step 5: 보조기구 -->
        <div class="step" id="step5">
            <h2>보행을 도와주는<br>기구를 사용하시나요?</h2>
            <div class="check-group" style="margin-bottom: 15px;">
                <label class="check-card"><input type="radio" name="hasDev" value="N" onclick="toggleDev(false)" checked>사용하지 않음</label>
                <label class="check-card"><input type="radio" name="hasDev" value="Y" onclick="toggleDev(true)">사용함</label>
            </div>
            <div id="devDetail" class="hidden">
                <input type="text" id="devName" placeholder="기구 종류 (예: 휠체어, 지팡이)">
            </div>
        </div>

        <!-- Step 6: 자가진단 (추후 자가진단 문항 추가 영역) -->
        <div class="step" id="step6">
            <h2>마지막 확인!<br>자가진단을 진행할까요?</h2>
            <p style="color: var(--text-sub); font-size: 14px;">보내주실 자가진단 문항이 여기에 들어갑니다.</p>
        </div>
    </form>

    <div class="footer">
        <button type="button" class="btn-prev hidden" id="prevBtn" onclick="moveStep(-1)">이전</button>
        <button type="button" class="btn-next" id="nextBtn" onclick="moveStep(1)">다음</button>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 6;

    function moveStep(delta) {
        const steps = document.querySelectorAll('.step');
        steps[currentStep-1].classList.remove('active');
        
        currentStep += delta;
        
        if(currentStep > totalSteps) {
            alert("온길 시작! 당신을 위한 맞춤 경로를 계산합니다.");
            return;
        }

        steps[currentStep-1].classList.add('active');
        updateUI();
    }

    function updateUI() {
        // 프로그레스 바
        document.getElementById('progress').style.width = (currentStep / totalSteps * 100) + '%';
        
        // 버튼 제어
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        if(currentStep === 1) prevBtn.classList.add('hidden');
        else prevBtn.classList.remove('hidden');

        if(currentStep === totalSteps) nextBtn.innerText = "온길 시작하기";
        else nextBtn.innerText = "다음";
    }

    function toggleDev(show) {
        document.getElementById('devDetail').classList.toggle('hidden', !show);
    }
</script>

</body>
</html>
