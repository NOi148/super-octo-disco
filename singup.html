<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>온길 - 정보입력</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="header"><h1 class="app-name">온길</h1></div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 14.2%"></div></div>
        <div class="step active">
            <h2>반가워요!<br>성함이 어떻게 되시나요?</h2>
            <input type="text" id="userName" placeholder="성함 입력">
        </div>
        <div class="footer">
            <button class="btn-main" onclick="alert('데이터 저장 로직 구현 필요!')">다음</button>
        </div>
    </div>
</body>
</html>
