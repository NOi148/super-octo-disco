<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>온길 - 정보 등록</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <button class="btn-back" onclick="location.href='./index.html'">〈</button>
            <h1 class="logo">정보 등록</h1>
        </header>

        <main class="app-main">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <div class="q-card">
                <h3>01. 기본 정보</h3>
                <input type="text" id="newId" placeholder="아이디 입력">
                <input type="password" id="newPw" placeholder="비밀번호 입력">
            </div>

            <div class="q-card">
                <h3>02. 건강 상태</h3>
                <p>이용하시는 보조기구가 있나요?</p>
                <div class="radio-group">
                    <label><input type="radio" name="aid" value="지팡이"> 지팡이</label>
                    <label><input type="radio" name="aid" value="보행기"> 보행기</label>
                    <label><input type="radio" name="aid" value="없음"> 없음</label>
                </div>
            </div>
        </main>

        <footer class="app-footer-btn">
            <button class="btn-primary-large" onclick="completeSignup()">가입 완료</button>
        </footer>
    </div>
    <script src="./js/signup.js"></script>
</body>
</html>
